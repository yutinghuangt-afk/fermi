<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                 "Microsoft JhengHei", sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
    color: #14171a;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .header {
    background: #000000;
    color: #ffffff;
    padding: 24px 28px;
  }
  .header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
  }
  .header .meta {
    color: #9b9b9b;
    font-size: 13px;
  }
  .body {
    padding: 24px 28px;
  }
  section {
    margin-bottom: 32px;
  }
  section h2 {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e1e8ed;
    color: #14171a;
  }
  section p {
    margin: 0 0 10px;
    line-height: 1.7;
    font-size: 15px;
  }
  .post {
    background: #f7f9fa;
    border-left: 4px solid #1da1f2;
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .post .meta {
    font-size: 13px;
    color: #657786;
    margin: 0 0 8px;
  }
  .post .meta a {
    color: #1da1f2;
    text-decoration: none;
  }
  .post blockquote {
    margin: 0 0 10px;
    padding: 0;
    font-size: 15px;
    line-height: 1.6;
    color: #14171a;
  }
  .post .comment {
    font-size: 14px;
    color: #555;
    margin: 0;
    font-style: italic;
  }
  .footer {
    background: #f5f5f5;
    padding: 16px 28px;
    font-size: 12px;
    color: #9b9b9b;
    text-align: center;
    border-top: 1px solid #e1e8ed;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🤖 X 動態摘要報告</h1>
    <div class="meta">生成時間：{{ generated_at }}｜分析貼文：{{ post_count }} 則</div>
  </div>
  <div class="body">
    {{ report_html }}
  </div>
  <div class="footer">
    由 Claude AI 自動生成｜每2小時更新一次
  </div>
</div>
</body>
</html>
